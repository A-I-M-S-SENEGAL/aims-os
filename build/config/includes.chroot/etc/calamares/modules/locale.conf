# =============================================================================
# AIMS OS — Calamares locale module defaults
# =============================================================================
# Override Calamares' built-in defaults (which fall back to America/New_York
# when geoip can't reach a lookup service — common in UTM Shared Network and
# anywhere outbound HTTPS is filtered). calamares-settings-debian does not
# ship a locale.conf, so this file is the only authoritative source.
#
# Users can still pick a different region/zone in the Localisation step;
# this just pre-selects Africa/Dakar so the common case is "click Next".
#
# Schema reference:
# https://github.com/calamares/calamares/blob/calamares/src/modules/locale/locale.conf
# =============================================================================
---
region: "Africa"
zone:   "Dakar"

# Debian's locale.gen path — same on Bookworm, Trixie, and downstream.
localeGenPath: "/etc/locale.gen"

# Deliberately NO `geoip:` block: we want a deterministic AIMS Sénégal
# default, not a network-dependent guess. The presence of the section is
# what enables the lookup; omit it = lookup disabled.

# =============================================================================
# AIMS OS — Calamares keyboard module defaults
# =============================================================================
# Pre-selects the AZERTY (fr) layout to match the live session's keyboard
# (set by hook 0010-timezone + live-build bootappend `keyboard-layouts=fr`).
# Users can pick another layout in the Clavier step; this is just the
# default shown when they land on it.
#
# Schema reference:
# https://github.com/calamares/calamares/blob/calamares/src/modules/keyboard/keyboard.conf
# =============================================================================
---
xkbModel:   "pc105"
xkbLayout:  "fr"
xkbVariant: ""

# Path to the host's keyboard backend script; the upstream default is
# correct on Bookworm, but stating it explicitly makes the config easier
# to audit when troubleshooting why a layout didn't stick.
keyboardSetupAvailableHooks: true

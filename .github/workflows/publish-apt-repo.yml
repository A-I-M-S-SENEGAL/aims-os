# =============================================================================
# AIMS OS — publish Pages (apt repo + docs site)
# =============================================================================
# Builds two artefact trees and deploys them to the single GitHub Pages site
# at https://a-i-m-s-senegal.github.io/aims-os/:
#
#   1. apt-repo/site/  — signed apt repository (metapackages, dists/, pool/,
#      Release + InRelease, public key, branded landing index.html)
#   2. apt-repo/site/docs/  — Astro Starlight documentation site, built from
#      docs/ with base path /aims-os/docs so internal links resolve under
#      the same Pages origin
#
# Uses GitHub's official Pages-from-Actions flow (configure-pages@v5 +
# upload-pages-artifact@v3 + deploy-pages@v4), one Pages environment per
# repo, no gh-pages branch.
#
# Triggers:
#   - workflow_dispatch — manual republish
#   - push tag v*       — publish alongside the matching ISO release
#
# Pre-reqs in repo settings:
#   - Secret  AIMS_GPG_PRIVATE_KEY   armored GPG private key (no passphrase)
#   - Settings → Pages → Build and deployment → Source: GitHub Actions
# =============================================================================

name: Publish Pages (apt repo + docs)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Pages-from-Actions needs `pages: write` + `id-token: write` for the
# OIDC trust handshake that lets the deploy step talk to the Pages API.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time per repo. Don't cancel an in-flight
# publish — the .deb / signature work is non-idempotent enough that we want
# the running job to finish cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: Build apt repo + docs, deploy to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build + apt-repo tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              build-essential debhelper dpkg-dev apt-utils gnupg

      - name: Build the .deb metapackages
        run: ./apt-repo/build-debs.sh

      - name: Import GPG signing key
        env:
          AIMS_GPG_PRIVATE_KEY: ${{ secrets.AIMS_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${AIMS_GPG_PRIVATE_KEY}" ]; then
              echo "::error::AIMS_GPG_PRIVATE_KEY secret is empty — set it in Settings → Secrets and variables → Actions"
              exit 1
          fi
          printf '%s\n' "${AIMS_GPG_PRIVATE_KEY}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Build & sign repo tree
        env:
          GPG_KEY_ID: CEAB168E6D2E30FF
        run: ./apt-repo/publish.sh

      - name: Stage .nojekyll + apt-repo landing page
        run: |
          # .nojekyll : Pages MUST NOT run Jekyll over an apt repo tree
          # (it strips files / dirs starting with `_` and rewrites things).
          touch apt-repo/site/.nojekyll
          # Branded landing page served at the bare URL. With .nojekyll
          # set, GitHub Pages does not auto-render README.md, so we ship
          # a real index.html. README.md stays around as a fallback for
          # tools that look for one.
          cp apt-repo/site-index.html  apt-repo/site/index.html
          cp apt-repo/site-README.md   apt-repo/site/README.md
          # AIMS logo referenced by the landing page (and used as favicon).
          cp apt-repo/aims-logo-256.png apt-repo/site/aims-logo-256.png

      - name: Setup Node 22 for the docs build
        if: hashFiles('docs/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build the Starlight docs site
        if: hashFiles('docs/package.json') != ''
        working-directory: docs
        run: |
          # npm install (not ci) — we deliberately do not commit
          # package-lock.json yet, see docs/README.md.
          npm install --silent
          npm run build
          du -sh dist

      - name: Merge docs site into Pages tree at /docs/
        if: hashFiles('docs/package.json') != ''
        run: |
          # astro.config.mjs uses base='/aims-os/docs', so dist/'s HTML
          # already points at /aims-os/docs/... — we just move it into
          # place under apt-repo/site/docs/.
          mkdir -p apt-repo/site/docs
          cp -r docs/dist/. apt-repo/site/docs/
          ls -la apt-repo/site/docs/ | head -10

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apt-repo/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

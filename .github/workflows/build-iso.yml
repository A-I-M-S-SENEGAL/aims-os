# =============================================================================
# AIMS OS — ISO build workflow
# =============================================================================
# Produces a live + installable ISO on GitHub-hosted Linux runners.
# Native amd64 runners (ubuntu-latest) and native arm64 runners
# (ubuntu-24.04-arm, GA since 2025-08 — only free on public repos).
#
# Triggers:
#   - workflow_dispatch  manual run, optional arch filter
#   - push tags v*       attaches the ISO to a GitHub Release
#
# Build pipeline (reused from local dev — no CI-specific hacks):
#   1. Free ~31 GB on the runner (default has ~14 GB; live-build needs ~30 GB).
#   2. Run `./build/build.sh <arch>` exactly as a developer would locally.
#   3. Upload the ISO + SHA-256 + build log as artifacts (always).
#   4. On a `v*` tag, attach the ISO + SHA-256 to the GitHub Release.
#
# Artifacts retention: 14 days for normal runs, 30 for tagged releases.
# =============================================================================

name: Build AIMS OS ISO

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture(s) to build"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - amd64
          - arm64

  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed for softprops/action-gh-release to publish

concurrency:
  # One build per arch per branch — newer pushes cancel older ones.
  group: build-iso-${{ github.ref }}-${{ github.event.inputs.arch || 'all' }}
  cancel-in-progress: false   # ISO builds are slow; let them finish

jobs:
  # ---------------------------------------------------------------------------
  # Compute the matrix from the workflow_dispatch arch input. For tag pushes
  # (no input) and the default "both", build amd64 + arm64 in parallel.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          case "${{ github.event.inputs.arch || 'both' }}" in
            amd64) echo 'matrix={"include":[{"arch":"amd64","runner":"ubuntu-latest"}]}' >> "$GITHUB_OUTPUT" ;;
            arm64) echo 'matrix={"include":[{"arch":"arm64","runner":"ubuntu-24.04-arm"}]}' >> "$GITHUB_OUTPUT" ;;
            *)     echo 'matrix={"include":[{"arch":"amd64","runner":"ubuntu-latest"},{"arch":"arm64","runner":"ubuntu-24.04-arm"}]}' >> "$GITHUB_OUTPUT" ;;
          esac

  # ---------------------------------------------------------------------------
  # The real work — one job per architecture, running natively.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.arch }} ISO
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    # Last successful amd64 took 58 min; adding large-packages + docker-images
    # cleanup (+4 min) tipped it past the previous 60-min limit. 90 leaves
    # headroom for slow runners without letting truly stuck jobs linger forever.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space (~40 GB reclaimed)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          # Enable large-packages: the v10 ISO crossed 9 GB after we added
          # Cursor + DBeaver + RStudio + Node 22 + Bun + Deno + uv. The arm64
          # runner ran out of room at the xorriso assembly step:
          #   xorriso : FAILURE : Image size 4436797s exceeds free space on
          #   media 3761570s
          # large-packages adds ~5 GB by purging azure-cli, google-chrome,
          # powershell, mono, etc. Costs ~3 min of build time, well worth it.
          large-packages: true
          # docker-images: clear the runner's pre-baked images. We build our
          # own aims-os-builder image fresh in the workflow, so the runner's
          # cached postgres / mysql / etc. images are pure ballast for us.
          # Frees another ~3 GB.
          docker-images: true
          swap-storage: true

      - name: Show available disk space
        run: df -h /

      - name: Build the ISO (./build/build.sh ${{ matrix.arch }})
        run: ./build/build.sh ${{ matrix.arch }}

      - name: Inspect produced ISO
        if: success()
        run: |
          ls -lh build/out/
          file build/out/aims-os-*.iso
          cat build/out/aims-os-*.iso.sha256

      - name: Upload ISO + checksum + log
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aims-os-1.0-${{ matrix.arch }}
          path: |
            build/out/aims-os-*.iso
            build/out/aims-os-*.iso.sha256
            build/out/aims-os-*.log
          retention-days: 14
          if-no-files-found: error
          compression-level: 0   # ISO is already squashfs-compressed

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.arch }}-failed
          path: |
            build/out/aims-os-*.log
            build/chroot/var/log/**
          retention-days: 14
          if-no-files-found: warn

      # ----------------------------------------------------------------------
      # Long-term ISO hosting on Cloudflare R2.
      # GitHub Releases reject assets > 2 GiB; our ISOs are ~8.5 GB. R2 has
      # no per-object limit (10 GB free tier, free egress for public reads)
      # so we upload the .iso + .sha256 there twice:
      #   - aims-os-iso/<tag>/aims-os-1.0-<arch>.iso  (immutable, versioned)
      #   - aims-os-iso/latest/aims-os-1.0-<arch>.iso (overwritten each tag)
      # The "latest/" alias is what the docs link to so users always pull
      # the most recent release without us editing URLs.
      # ----------------------------------------------------------------------
      - name: Upload ISO + sha256 to Cloudflare R2
        if: success() && startsWith(github.ref, 'refs/tags/v')
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    auto
          R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          TAG:                   ${{ github.ref_name }}
          ARCH:                  ${{ matrix.arch }}
        run: |
          # aws CLI v2 is pre-installed on ubuntu-latest runners.
          aws --version

          ISO="build/out/aims-os-1.0-${ARCH}.iso"
          SHA="${ISO}.sha256"
          ls -lh "${ISO}" "${SHA}"

          # Versioned copy (immutable, kept indefinitely).
          aws s3 cp "${ISO}" "s3://${R2_BUCKET}/${TAG}/aims-os-1.0-${ARCH}.iso" \
              --endpoint-url "${R2_ENDPOINT}" \
              --content-type application/x-iso9660-image \
              --no-progress
          aws s3 cp "${SHA}" "s3://${R2_BUCKET}/${TAG}/aims-os-1.0-${ARCH}.iso.sha256" \
              --endpoint-url "${R2_ENDPOINT}" \
              --content-type text/plain \
              --no-progress

          # latest/ alias (overwritten each tag).
          #
          # R2 has two distinct holes in CopyObject compatibility:
          #   1. GetObjectTagging is not implemented; aws s3 cp's cross-bucket
          #      copy path tries to fetch tags first. --copy-props none skips it.
          #   2. The 'x-amz-tagging-directive' header (any value) returns 501
          #      NotImplemented. aws s3 cp omits this header on MultipartCopy
          #      (objects ≥ 8 MB) but ALWAYS sends it on small-object CopyObject,
          #      regardless of --copy-props.
          # → ISO (~9 GB) goes through MultipartCopy and works fine.
          # → .sha256 (88 B) hits the small-object path and fails 501.
          # Workaround: re-upload the local .sha256 instead of server-side copy.
          aws s3 cp "s3://${R2_BUCKET}/${TAG}/aims-os-1.0-${ARCH}.iso" \
                    "s3://${R2_BUCKET}/latest/aims-os-1.0-${ARCH}.iso" \
              --endpoint-url "${R2_ENDPOINT}" \
              --copy-props none \
              --no-progress
          aws s3 cp "${SHA}" "s3://${R2_BUCKET}/latest/aims-os-1.0-${ARCH}.iso.sha256" \
              --endpoint-url "${R2_ENDPOINT}" \
              --content-type text/plain \
              --no-progress

          echo "✓ Uploaded to R2:"
          echo "    ${{ secrets.R2_PUBLIC_BASE }}/${TAG}/aims-os-1.0-${ARCH}.iso"
          echo "    ${{ secrets.R2_PUBLIC_BASE }}/latest/aims-os-1.0-${ARCH}.iso"

      # ----------------------------------------------------------------------
      # GitHub Release. .iso is too big for releases (2 GiB limit), so we
      # only attach the .sha256 here and put the R2 download URLs in the
      # release body. The .sha256 is what users need anyway to verify the
      # download they grabbed from R2.
      # ----------------------------------------------------------------------
      - name: Attach SHA-256 + download links to GitHub Release (on tag push)
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/out/aims-os-*.iso.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            ## Download

            ISOs are hosted on Cloudflare R2 (GitHub Releases cap assets at 2 GiB; our images are ~8.5 GB).

            **${{ github.ref_name }} — pinned to this release**

            - arm64: <${{ secrets.R2_PUBLIC_BASE }}/${{ github.ref_name }}/aims-os-1.0-arm64.iso>
            - amd64: <${{ secrets.R2_PUBLIC_BASE }}/${{ github.ref_name }}/aims-os-1.0-amd64.iso>

            **Always-latest aliases (overwritten by each new release)**

            - arm64: <${{ secrets.R2_PUBLIC_BASE }}/latest/aims-os-1.0-arm64.iso>
            - amd64: <${{ secrets.R2_PUBLIC_BASE }}/latest/aims-os-1.0-amd64.iso>

            ## Verify

            ```bash
            shasum -a 256 -c aims-os-1.0-arm64.iso.sha256
            ```

            The `.sha256` files attached to this release pin the bytes for ${{ github.ref_name }}; the bytes on R2 must match.
